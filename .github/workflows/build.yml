name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Verify lib files
        shell: bash
        run: |
          echo "=== lib/ contents ==="
          ls -la lib/
          echo "=== .csproj references ==="
          grep HintPath DataCenter-NetworkingPlus/NetworkingPlus.csproj

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Build
        run: dotnet build DataCenter-NetworkingPlus/NetworkingPlus.csproj -c Release

      - name: Get DLL path
        id: dll
        shell: bash
        run: |
          DLL_PATH="DataCenter-NetworkingPlus/bin/Release/net6.0/NetworkingPlus.dll"
          echo "path=$DLL_PATH" >> $GITHUB_OUTPUT

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: NetworkingPlus v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.dll.outputs.path }}
          body: |
            ## NetworkingPlus v${{ steps.version.outputs.version }}

            ### Installation
            1. Install [MelonLoader](https://melonwiki.xyz/) for Data Center
            2. Download `NetworkingPlus.dll` from this release
            3. Drop it into `Data Center/Mods/`
            4. Launch the game

            ### Changes
            See commit history for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: NetworkingPlus
          path: ${{ steps.dll.outputs.path }}
